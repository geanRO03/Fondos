<body>
<div id="app"></div>
<script>
(function(){
"use strict";

var LS_KEY = "gema-fondos-v2";
var LS_KEY_OLD = "gema-fondos-v1";
var LS_KEY_LASTPROMPT = "gema-fondos-lastprompt";
var LS_KEY_LASTBACKUP = "gema-fondos-lastbackup";
var LS_KEY_DIEZMOPCT = "gema-fondos-diezmopct";

function obtenerPorcentajeDiezmo(){
  var v = null;
  try { v = parseFloat(localStorage.getItem(LS_KEY_DIEZMOPCT)); } catch(e){}
  return (v > 0 && v <= 100) ? v : 10;
}
function guardarPorcentajeDiezmo(pct){
  try { localStorage.setItem(LS_KEY_DIEZMOPCT, String(pct)); } catch(e){}
}
var CATEGORIAS = ["Materiales","Mano de obra","Maquinaria/Renta","Subcontratos","Permisos/Trámites","Transporte","Diezmo","Otros"];
var CAT_COLOR = {
  "Materiales":"#33513F","Mano de obra":"#A34432","Maquinaria/Renta":"#3D6E8F","Subcontratos":"#6B5B95",
  "Permisos/Trámites":"#7A6A4F","Transporte":"#4F7A6A","Diezmo":"#9C7A2E","Otros":"#8A8270"
};
var MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var MESES_ABR = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }
function fmtMoney(n, moneda){
  var abs = Math.abs(n);
  var s = abs.toLocaleString("es-NI", { minimumFractionDigits: (abs % 1 === 0) ? 0 : 2, maximumFractionDigits: 2 });
  return (moneda === "USD" ? "US$ " : "C$ ") + s;
}
function fmtFecha(iso){
  var p = iso.split("-"); var d = parseInt(p[2],10); var m = parseInt(p[1],10);
  return d + " " + MESES_ABR[m-1];
}
function fmtFechaCorta(iso){
  var p = iso.split("-"); return p[2] + "/" + p[1] + "/" + p[0].slice(2);
}
function montoConvertidoDe(m, fondoMoneda){
  return (typeof m.montoConvertido === "number" && !isNaN(m.montoConvertido)) ? m.montoConvertido : m.monto;
}
function saldoDe(f){
  var gastado = f.movimientos.reduce(function(a,m){ return a + montoConvertidoDe(m, f.moneda); }, 0);
  return Math.round((f.montoInicial - gastado) * 100) / 100;
}

function shouldPromptBackup(){
  if(state.fondos.length === 0) return false;
  var lastPrompt = "";
  try { lastPrompt = localStorage.getItem(LS_KEY_LASTPROMPT) || ""; } catch(e){}
  return lastPrompt !== todayISO();
}
function marcarPrompteado(){
  try { localStorage.setItem(LS_KEY_LASTPROMPT, todayISO()); } catch(e){}
}
function marcarRespaldado(){
  try { localStorage.setItem(LS_KEY_LASTBACKUP, new Date().toISOString()); } catch(e){}
}
function ultimoRespaldoTexto(){
  var iso = "";
  try { iso = localStorage.getItem(LS_KEY_LASTBACKUP) || ""; } catch(e){}
  if(!iso) return "Todavía no has guardado ninguna copia.";
  var d = new Date(iso);
  var hoy = new Date();
  var dias = Math.floor((hoy - d) / 86400000);
  if(dias <= 0) return "Última copia: hoy.";
  if(dias === 1) return "Última copia: ayer.";
  return "Última copia: hace " + dias + " días.";
}

// ---------- state ----------
var state = {
  fondos: [],
  tab: "inicio",
  openFondoId: null,
  modal: null,          // 'nuevoFondo' | 'nuevoMov' | 'ajustes' | 'confirmDelete' | 'confirmImport'
  confirmDeleteId: null,
  importPayload: null,
  importFormato: null,
  toast: null,
  saveError: false,
  reportMes: new Date().getMonth(),
  reportAnio: new Date().getFullYear(),
  historialPeriodo: "todo",
  historialAnio: new Date().getFullYear(),
  historialMes: new Date().getMonth(),
  historialDia: todayISO(),
  historialOrden: "fecha_desc",
  reportesOrden: "fecha_desc",
  editandoMovId: null,
  confirmFinalizarId: null,
  deteccion: null
};
var mem = { categoriaSel: "Otros" }; // transient (not re-rendered per keystroke)

function load(){
  try {
    var raw = localStorage.getItem(LS_KEY);
    if(!raw) raw = localStorage.getItem(LS_KEY_OLD); // migrate from earlier version
    state.fondos = raw ? JSON.parse(raw) : [];
  } catch(e){ state.fondos = []; }
}
function save(){
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(state.fondos));
    state.saveError = false;
  } catch(e){
    state.saveError = true;
  }
}
function setState(patch){
  Object.assign(state, patch);
  render();
}
function showToast(msg){
  state.toast = { id: uid(), msg: msg };
  render();
  clearTimeout(showToast._t);
  showToast._t = setTimeout(function(){ state.toast = null; render(); }, 1900);
}

// ---------- actions ----------
function addFondo(nombre, monto, moneda, fecha, diezmoPct){
  var nuevo = { id: uid(), nombre: nombre, moneda: moneda, montoInicial: monto, fecha: fecha, movimientos: [], cerradoManual: false };
  if(diezmoPct > 0){
    var montoDiezmo = Math.round(monto * (diezmoPct/100) * 100) / 100;
    if(montoDiezmo > 0){
      nuevo.movimientos.push({
        id: uid(), desc: "Diezmo", monto: montoDiezmo, moneda: moneda,
        tipoCambio: null, montoConvertido: montoDiezmo, categoria: "Diezmo", fecha: fecha
      });
    }
  }
  state.fondos.unshift(nuevo);
  save();
  state.modal = null;
  render();
  showToast(diezmoPct > 0 ? "Fondo anotado \u2014 diezmo apartado" : "Fondo anotado");
}
function addMovimiento(fondoId, desc, monto, monedaGasto, tipoCambio, montoConvertido, categoria, fecha){
  var f = state.fondos.find(function(x){ return x.id === fondoId; });
  if(!f) return;
  f.movimientos.unshift({
    id: uid(), desc: desc, monto: monto, moneda: monedaGasto,
    tipoCambio: tipoCambio, montoConvertido: montoConvertido,
    categoria: categoria, fecha: fecha
  });
  save();
  state.modal = null;
  render();
  showToast("Gasto anotado");
}
function editarMovimiento(fondoId, movId, desc, monto, monedaGasto, tipoCambio, montoConvertido, categoria, fecha){
  var f = state.fondos.find(function(x){ return x.id === fondoId; });
  if(!f) return;
  var m = f.movimientos.find(function(x){ return x.id === movId; });
  if(!m) return;
  m.desc = desc; m.monto = monto; m.moneda = monedaGasto; m.tipoCambio = tipoCambio;
  m.montoConvertido = montoConvertido; m.categoria = categoria; m.fecha = fecha;
  save();
  state.modal = null;
  state.editandoMovId = null;
  render();
  showToast("Gasto actualizado");
}
function deleteMovimiento(fondoId, movId){
  var f = state.fondos.find(function(x){ return x.id === fondoId; });
  if(!f) return;
  f.movimientos = f.movimientos.filter(function(m){ return m.id !== movId; });
  save();
  render();
}
function deleteFondo(fondoId){
  state.fondos = state.fondos.filter(function(x){ return x.id !== fondoId; });
  save();
  state.modal = null; state.confirmDeleteId = null; state.openFondoId = null;
  render();
}
function finalizarProyecto(fondoId){
  var f = state.fondos.find(function(x){ return x.id === fondoId; });
  if(!f) return;
  f.cerradoManual = true;
  save();
  state.modal = null;
  render();
  showToast("Proyecto finalizado");
}
function reabrirProyecto(fondoId){
  var f = state.fondos.find(function(x){ return x.id === fondoId; });
  if(!f) return;
  f.cerradoManual = false;
  save();
  render();
  showToast("Proyecto reabierto");
}

// ---------- tabular schema shared by CSV / Excel export+import ----------
var TABLA_COLUMNAS = ["fondo_id","fondo","moneda_fondo","monto_recibido","fecha_fondo","movimiento_id","descripcion","categoria","moneda_gasto","monto","tipo_cambio","monto_en_moneda_fondo","fecha_gasto"];

function fondosATabla(fondos){
  var rows = [];
  fondos.forEach(function(f){
    var base = { fondo_id: f.id, fondo: f.nombre, moneda_fondo: f.moneda, monto_recibido: f.montoInicial, fecha_fondo: f.fecha };
    if(f.movimientos.length === 0){
      rows.push(Object.assign({}, base, { movimiento_id:"", descripcion:"", categoria:"", moneda_gasto:"", monto:"", tipo_cambio:"", monto_en_moneda_fondo:"", fecha_gasto:"" }));
    } else {
      f.movimientos.forEach(function(m){
        rows.push(Object.assign({}, base, {
          movimiento_id: m.id, descripcion: m.desc, categoria: m.categoria,
          moneda_gasto: m.moneda || f.moneda, monto: m.monto,
          tipo_cambio: (m.tipoCambio != null ? m.tipoCambio : ""),
          monto_en_moneda_fondo: montoConvertidoDe(m, f.moneda),
          fecha_gasto: m.fecha
        }));
      });
    }
  });
  return rows;
}

function tablaAFondos(rows){
  var map = {}, order = [];
  rows.forEach(function(r){
    var fid = String(r.fondo_id == null ? "" : r.fondo_id).trim();
    if(!fid) return;
    if(!map[fid]){
      map[fid] = {
        id: fid,
        nombre: String(r.fondo == null ? "" : r.fondo).trim() || "Fondo",
        moneda: (String(r.moneda_fondo).trim() === "C$" ? "C$" : "USD"),
        montoInicial: parseFloat(r.monto_recibido) || 0,
        fecha: (String(r.fecha_fondo == null ? "" : r.fecha_fondo).trim() || todayISO()),
        movimientos: []
      };
      order.push(fid);
    }
    var movId = String(r.movimiento_id == null ? "" : r.movimiento_id).trim();
    if(movId){
      var montoNum = parseFloat(r.monto);
      if(!isNaN(montoNum)){
        var tcRaw = r.tipo_cambio;
        var tc = (tcRaw !== "" && tcRaw != null && !isNaN(parseFloat(tcRaw))) ? parseFloat(tcRaw) : null;
        var mcNum = parseFloat(r.monto_en_moneda_fondo);
        map[fid].movimientos.push({
          id: movId,
          desc: String(r.descripcion == null ? "" : r.descripcion).trim(),
          categoria: String(r.categoria == null ? "" : r.categoria).trim() || "Otros",
          moneda: (String(r.moneda_gasto).trim() === "C$" ? "C$" : "USD"),
          monto: montoNum,
          tipoCambio: tc,
          montoConvertido: isNaN(mcNum) ? montoNum : mcNum,
          fecha: (String(r.fecha_gasto == null ? "" : r.fecha_gasto).trim() || todayISO())
        });
      }
    }
  });
  return order.map(function(fid){ return map[fid]; });
}

function descargarBlob(blob, filename){
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

// ---------- export ----------
function exportarJSON(){
  var payload = { app: "gema-fondos", version: 2, exportado: new Date().toISOString(), fondos: state.fondos };
  descargarBlob(new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" }), "gema-fondos-" + todayISO() + ".json");
  marcarRespaldado();
  showToast("Respaldo JSON descargado");
}
function exportarCSV(){
  var rows = fondosATabla(state.fondos);
  var csv = (window.Papa && Papa.unparse) ? Papa.unparse(rows, { columns: TABLA_COLUMNAS }) : filasACSVManual(rows);
  descargarBlob(new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" }), "gema-fondos-" + todayISO() + ".csv");
  marcarRespaldado();
  showToast("CSV descargado");
}
function filasACSVManual(rows){
  function q(v){ v = (v==null?"":String(v)); return /[",\n]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v; }
  var lines = [TABLA_COLUMNAS.join(",")];
  rows.forEach(function(r){ lines.push(TABLA_COLUMNAS.map(function(c){ return q(r[c]); }).join(",")); });
  return lines.join("\r\n");
}
function exportarXLSX(){
  if(!window.XLSX){ showToast("No se pudo cargar Excel. Revisa tu conexión."); return; }
  var rows = fondosATabla(state.fondos);
  var ws = XLSX.utils.json_to_sheet(rows, { header: TABLA_COLUMNAS });
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Fondos");
  XLSX.writeFile(wb, "gema-fondos-" + todayISO() + ".xlsx");
  marcarRespaldado();
  showToast("Excel descargado");
}
function exportarTXT(){
  var lines = [];
  lines.push("GEMA \u2014 CUADERNO DE FONDOS");
  lines.push("Exportado " + fmtFechaCorta(todayISO()));
  lines.push("");
  var ordenados = state.fondos.slice().sort(function(a,b){ return a.fecha < b.fecha ? -1 : (a.fecha > b.fecha ? 1 : 0); });
  ordenados.forEach(function(f, idx){
    var saldo = saldoDe(f);
    lines.push((idx+1) + "- " + fmtMoney(f.montoInicial, f.moneda) + " " + f.nombre + " " + fmtFechaCorta(f.fecha));
    f.movimientos.slice().reverse().forEach(function(m){
      var num = Math.abs(m.monto).toLocaleString("es-NI", { minimumFractionDigits: (m.monto%1===0)?0:2, maximumFractionDigits:2 });
      var linea = "-" + num;
      if(m.moneda && m.moneda !== f.moneda) linea += " " + (m.moneda === "USD" ? "US$" : "C$");
      linea += " " + m.desc + " " + fmtFechaCorta(m.fecha);
      if(m.moneda && m.moneda !== f.moneda) linea += " (= " + fmtMoney(montoConvertidoDe(m, f.moneda), f.moneda) + ")";
      lines.push(linea);
    });
    lines.push("= saldo " + fmtMoney(saldo, f.moneda));
    lines.push("");
  });
  descargarBlob(new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" }), "gema-fondos-" + todayISO() + ".txt");
  showToast("Texto descargado");
}

// ---------- import ----------
function prepararImport(fondosNuevos, formato){
  if(!fondosNuevos || fondosNuevos.length === 0){ showToast("Ese archivo no tiene datos que importar"); return; }
  state.importPayload = fondosNuevos;
  state.importFormato = formato;
  state.modal = "confirmImport";
  render();
}
function onFileChosen(file){
  var name = file.name.toLowerCase();
  if(name.endsWith(".json")){
    var r1 = new FileReader();
    r1.onload = function(){
      try {
        var parsed = JSON.parse(r1.result);
        var lista = Array.isArray(parsed) ? parsed : parsed.fondos;
        if(!Array.isArray(lista)) throw new Error("formato");
        var limpio = lista.filter(function(f){ return f && f.id && f.nombre && Array.isArray(f.movimientos); });
        prepararImport(limpio, "JSON");
      } catch(err){ showToast("Ese archivo no se pudo leer"); }
    };
    r1.readAsText(file);
  } else if(name.endsWith(".csv")){
    if(!window.Papa){ showToast("No se pudo cargar el lector de CSV. Revisa tu conexión."); return; }
    var r2 = new FileReader();
    r2.onload = function(){
      try {
        var parsed = Papa.parse(r2.result, { header: true, skipEmptyLines: true });
        prepararImport(tablaAFondos(parsed.data), "CSV");
      } catch(err){ showToast("Ese archivo no se pudo leer"); }
    };
    r2.readAsText(file);
  } else if(name.endsWith(".xlsx") || name.endsWith(".xls")){
    if(!window.XLSX){ showToast("No se pudo cargar el lector de Excel. Revisa tu conexión."); return; }
    var r3 = new FileReader();
    r3.onload = function(){
      try {
        var data = new Uint8Array(r3.result);
        var wb = XLSX.read(data, { type: "array" });
        var sheet = wb.Sheets[wb.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
        prepararImport(tablaAFondos(rows), "Excel");
      } catch(err){ showToast("Ese archivo no se pudo leer"); }
    };
    r3.readAsArrayBuffer(file);
  } else {
    showToast("Formato no compatible. Usa JSON, CSV o Excel.");
  }
}
function confirmarImport(){
  state.fondos = state.importPayload;
  save();
  state.importPayload = null;
  state.modal = null;
  render();
  showToast("Respaldo importado");
}

// ---------- icons (inline svg, lucide-style outline) ----------
function icon(name, size, color){
  size = size || 18; color = color || "currentColor";
  var s = 'width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
  var paths = {

  };
  return '<svg '+s+'>'+(paths[name]||'')+'</svg>';
}

// ---------- render ----------
function render(){
  var root = document.getElementById("app");
  var fondoAbierto = state.openFondoId ? state.fondos.find(function(f){ return f.id === state.openFondoId; }) : null;

  var html = "";
  if(fondoAbierto){
    html += renderDetail(fondoAbierto);
  } else {
    html += renderHeader();
    html += '<div>';
    if(state.tab === "inicio") html += renderInicio();
    if(state.tab === "reportes") html += renderReportes();
    if(state.tab === "historial") html += renderHistorial();
    html += '</div>';
    html += renderTabBar();
  }
  html += renderModal();
  html += renderToast();

  root.innerHTML = html;
  bindOnce();
  afterRender(fondoAbierto);
}

function renderHeader(){
  return '' +
  '<div style="padding:calc(18px + env(safe-area-inset-top,0px)) 20px 16px;border-bottom:1px solid var(--line);margin-bottom:4px;">' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-end;">' +
      '<div>' +
        '<div class="mono" style="font-size:10.5px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;margin-bottom:3px;">Registro de ingresos y gastos</div>' +
        '<div class="display" style="font-size:29px;font-weight:700;color:var(--forest-dk);letter-spacing:-0.3px;">Fondos</div>' +
      '</div>' +
      '<button class="press" data-action="open-ajustes" style="background:none;border:none;padding:8px;margin-bottom:2px;color:var(--forest-dk);">' + icon("settings",19) + '</button>' +
    '</div>' +
  '</div>';
}

function renderInicio(){
  var activos = state.fondos.filter(function(f){ return !f.cerradoManual && saldoDe(f) > 0.009; });
  var html = '<div style="padding:0 20px;" class="fade-slide">';
  if(state.saveError){
    html += '<div class="pop-in" style="display:flex;gap:8px;align-items:center;background:#F6E9E4;border:1px solid rgba(163,68,50,.35);border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:13px;color:var(--rust);">' + icon("alert",16) + ' No se pudo guardar. El teléfono puede tener poco espacio.</div>';
  }
  html += '<button data-action="open-nuevo-fondo" class="press" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--forest);color:var(--cream);border:none;border-radius:10px;padding:14px 0;font-size:16px;font-weight:600;margin-bottom:22px;">' + icon("plus",19) + ' Nuevo fondo</button>';

  if(activos.length === 0){
    html += '<div class="pop-in" style="text-align:center;padding:40px 10px;color:var(--muted);">' + icon("wallet",30) + '<div class="display" style="font-size:17px;color:var(--ink);margin:10px 0 4px;">Aún no hay nada anotado</div><div style="font-size:14px;">Toca "Nuevo fondo" cuando recibas un ingreso para empezar a llevarlo aquí.</div></div>';
  } else {
    html += '<div style="font-size:12px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;">Fondos activos (' + activos.length + ')</div>';
    activos.forEach(function(f, i){ html += renderFondoRow(f, i); });
  }
  html += '</div>';
  return html;
}

function renderFondoRow(f, i){
  var saldo = saldoDe(f);
  var pct = f.montoInicial > 0 ? Math.max(0, Math.min(100, (saldo / f.montoInicial) * 100)) : 0;
  return '' +
  '<div class="row-in" style="animation-delay:' + (i*45) + 'ms;">' +
  '<button class="press" data-action="open-fondo" data-id="' + f.id + '" style="width:100%;text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:block;">' +
    '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">' +
      '<div style="font-size:15.5px;font-weight:500;color:var(--ink);padding-right:8px;">' + esc(f.nombre) + '</div>' +
      '<div class="mono" style="font-size:15px;font-weight:600;color:var(--forest-dk);white-space:nowrap;">' + fmtMoney(saldo, f.moneda) + '</div>' +
    '</div>' +
    '<div style="height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:6px;"><div class="bar-fill" style="height:100%;width:' + pct + '%;background:var(--forest);border-radius:2px;"></div></div>' +
    '<div style="font-size:12px;color:var(--muted);display:flex;justify-content:space-between;"><span>Recibido ' + fmtFecha(f.fecha) + ' · ' + fmtMoney(f.montoInicial, f.moneda) + '</span>' + icon("chevronRight",14) + '</div>' +
  '</button></div>';
}

function renderDetail(f){
  var saldo = saldoDe(f);
  var gastado = f.montoInicial - saldo;
  var html = '<div style="min-height:100vh;padding-bottom:40px;" class="fade-slide">';
  html += '<div style="padding:calc(20px + env(safe-area-inset-top,0px)) 20px 0;">';
  html += '<button data-action="cerrar-fondo-detalle" class="press" style="background:none;border:none;display:flex;align-items:center;gap:4px;color:var(--muted);font-size:14px;padding:8px 0;margin:-8px 0 14px -4px;">' + icon("chevronLeft",16) + ' Todos los fondos</button>';
  html += '<div class="display" style="font-size:24px;font-weight:600;color:var(--forest-dk);margin-bottom:4px;">' + esc(f.nombre) + '</div>';
  html += '<div style="font-size:13px;color:var(--muted);margin-bottom:18px;">Recibido el ' + fmtFecha(f.fecha) + (f.cerradoManual ? ' \u00b7 <span style="color:var(--gold);">finalizado manualmente</span>' : '') + '</div>';

  html += '<div class="pop-in" style="background:var(--forest-dk);border-radius:12px;padding:18px 20px;color:var(--cream);margin-bottom:14px;">';
  html += '<div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;opacity:.65;margin-bottom:4px;">Saldo disponible</div>';
  html += '<div class="mono" style="font-size:30px;font-weight:600;margin-bottom:10px;">' + fmtMoney(saldo, f.moneda) + '</div>';
  html += '<div style="display:flex;justify-content:space-between;font-size:12.5px;opacity:.8;"><span>Recibido: ' + fmtMoney(f.montoInicial, f.moneda) + '</span><span>Gastado: ' + fmtMoney(gastado, f.moneda) + '</span></div>';
  html += '</div>';

  html += '<button data-action="open-nuevo-mov" class="press" style="width:100%;background:var(--forest);color:var(--cream);border:none;border-radius:8px;padding:12px 0;font-size:14.5px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:22px;">' + icon("plus",16) + ' Anotar gasto</button>';
  html += '</div>';

  html += '<div class="ledger-lines" style="padding:4px 20px 20px;">';
  if(f.movimientos.length === 0){
    html += '<div style="color:var(--muted);font-size:14px;padding:20px 0;text-align:center;">Sin gastos anotados todavía.</div>';
  } else {
    f.movimientos.forEach(function(m, i){
      var monedaGasto = m.moneda || f.moneda;
      var convertido = monedaGasto !== f.moneda;
      html += '<div class="row-in press" data-action="edit-mov" data-fondo="' + f.id + '" data-mov="' + m.id + '" style="animation-delay:' + (Math.min(i,8)*35) + 'ms;display:flex;align-items:center;gap:10px;padding:9px 0;cursor:pointer;">' +
        '<div style="width:8px;height:8px;border-radius:50%;background:' + (CAT_COLOR[m.categoria]||"#8A8270") + ';flex-shrink:0;"></div>' +
        '<div style="flex:1;min-width:0;"><div style="font-size:14.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(m.desc) + '</div>' +
        '<div style="font-size:11.5px;color:var(--muted);">' + esc(m.categoria) + ' · ' + fmtFecha(m.fecha) + '</div></div>' +
        '<div style="text-align:right;white-space:nowrap;">' +
          '<div class="mono" style="font-size:14.5px;color:var(--rust);font-weight:500;">\u2212' + fmtMoney(m.monto, monedaGasto) + '</div>' +
          (convertido ? '<div class="mono" style="font-size:10.5px;color:var(--muted);">\u2248 ' + fmtMoney(montoConvertidoDe(m, f.moneda), f.moneda) + '</div>' : '') +
        '</div>' +
        '<button data-action="delete-mov" data-fondo="' + f.id + '" data-mov="' + m.id + '" class="press" style="background:none;border:none;padding:4px;color:var(--muted);">' + icon("x",14) + '</button>' +
      '</div>';
    });
  }
  html += '</div>';

  html += '<div style="padding:10px 20px 0;display:flex;flex-direction:column;align-items:flex-start;gap:12px;">';
  if(f.cerradoManual){
    html += '<button data-action="reabrir-proyecto" data-id="' + f.id + '" class="press" style="background:none;border:none;color:var(--forest);font-size:12.5px;display:flex;align-items:center;gap:5px;padding:0;font-weight:600;">' + icon("repeat",13) + ' Reabrir proyecto</button>';
  } else if(saldo > 0.009){
    html += '<button data-action="confirm-finalizar" data-id="' + f.id + '" class="press" style="background:none;border:none;color:var(--muted);font-size:12.5px;display:flex;align-items:center;gap:5px;padding:0;">' + icon("check",13) + ' Finalizar proyecto (aunque quede saldo)</button>';
  }
  html += '<button data-action="confirm-delete-fondo" data-id="' + f.id + '" class="press" style="background:none;border:none;color:var(--muted);font-size:12.5px;display:flex;align-items:center;gap:5px;padding:0;">' + icon("trash",13) + ' Eliminar este fondo</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

function renderReportes(){
  var mes = state.reportMes, anio = state.reportAnio;
  var porMoneda = { USD: { ingresos:0, gastos:0, diezmo:0 }, "C$": { ingresos:0, gastos:0, diezmo:0 } };
  state.fondos.forEach(function(f){
    var parts = f.fecha.split("-"); var fy = parseInt(parts[0],10), fm = parseInt(parts[1],10);
    if(fy === anio && fm-1 === mes) porMoneda[f.moneda].ingresos += f.montoInicial;
    f.movimientos.forEach(function(m){
      var mp = m.fecha.split("-"); var my = parseInt(mp[0],10), mm = parseInt(mp[1],10);
      if(my === anio && mm-1 === mes){
        var valor = montoConvertidoDe(m, f.moneda);
        porMoneda[f.moneda].gastos += valor;
        if(m.categoria === "Diezmo") porMoneda[f.moneda].diezmo += valor;
      }
    });
  });

  var flatMes = reportesMovimientosFlat(mes, anio);
  var vacio = porMoneda.USD.ingresos===0 && porMoneda.USD.gastos===0 && porMoneda["C$"].ingresos===0 && porMoneda["C$"].gastos===0;

  var html = '<div style="padding:0 20px;" class="fade-slide">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">';
  html += '<button data-action="mes-prev" class="press" style="background:none;border:none;padding:8px;color:var(--muted);">' + icon("chevronLeft",18) + '</button>';
  html += '<div class="pop-in display" style="font-size:18px;font-weight:600;color:var(--forest-dk);">' + MESES[mes] + " " + anio + '</div>';
  html += '<button data-action="mes-next" class="press" style="background:none;border:none;padding:8px;color:var(--muted);">' + icon("chevronRight",18) + '</button>';
  html += '</div>';

  ["USD","C$"].forEach(function(moneda){
    var d = porMoneda[moneda];
    if(d.ingresos===0 && d.gastos===0) return;
    html += '<div style="margin-bottom:16px;">';
    html += '<div class="mono" style="font-size:10.5px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;">' + (moneda==="USD"?"D\u00f3lares":"C\u00f3rdobas") + '</div>';
    html += filaResumen("Ingresos", fmtMoney(d.ingresos, moneda), "var(--forest)");
    html += filaResumen("Gastos", fmtMoney(d.gastos, moneda), "var(--rust)");
    html += filaResumen("Diezmo", fmtMoney(d.diezmo, moneda), "var(--gold)");
    html += '</div>';
  });

  if(flatMes.length > 0){
    html += '<div style="margin-bottom:18px;"><select id="rep-orden-sel" style="' + inputStyle + '">' +
      ORDEN_OPCIONES.map(function(o){ return '<option value="' + o[0] + '"' + (o[0]===state.reportesOrden?" selected":"") + '>Ordenar: ' + o[1] + '</option>'; }).join("") +
    '</select></div>';
    var ordenadoMes = ordenarLista(flatMes, state.reportesOrden);
    var agrupadoMes = agruparPorCategoria(ordenadoMes);
    html += renderBloquesCategoria(agrupadoMes);
  } else if(vacio){
    html += '<div class="pop-in" style="text-align:center;padding:40px 10px;color:var(--muted);">' + icon("pie",28) + '<div style="font-size:14px;margin-top:10px;">No hay movimientos este mes.</div></div>';
  }
  html += '</div>';
  return html;
}
function reportesMovimientosFlat(mes, anio){
  var lista = [];
  state.fondos.forEach(function(f){
    f.movimientos.forEach(function(m){
      var mp = m.fecha.split("-"); var my = parseInt(mp[0],10), mm = parseInt(mp[1],10);
      if(my === anio && mm-1 === mes){
        lista.push({
          fondoId: f.id, fondoNombre: f.nombre, categoria: m.categoria || "Otros",
          desc: m.desc, monto: montoConvertidoDe(m, f.moneda), moneda: f.moneda, fecha: m.fecha
        });
      }
    });
  });
  return lista;
}
function filaResumen(label, value, color){
  return '<div style="display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--line);"><span style="font-size:13.5px;color:var(--ink);">' + label + '</span><span class="mono" style="font-size:14.5px;font-weight:600;color:' + color + ';">' + value + '</span></div>';
}

var ORDEN_OPCIONES = [
  ["fecha_desc", "Fecha \u2014 recientes primero"],
  ["fecha_asc", "Fecha \u2014 antiguos primero"],
  ["monto_desc", "Monto \u2014 mayor a menor"],
  ["monto_asc", "Monto \u2014 menor a mayor"],
  ["nombre_asc", "Nombre \u2014 A a Z"],
  ["nombre_desc", "Nombre \u2014 Z a A"]
];

function historialMovimientosFlat(){
  var cerrados = state.fondos.filter(function(f){ return f.cerradoManual || saldoDe(f) <= 0.009; });
  var lista = [];
  cerrados.forEach(function(f){
    f.movimientos.forEach(function(m){
      lista.push({
        fondoId: f.id, fondoNombre: f.nombre, categoria: m.categoria || "Otros",
        desc: m.desc, monto: montoConvertidoDe(m, f.moneda), moneda: f.moneda, fecha: m.fecha
      });
    });
  });
  return lista;
}
function fechaMasRecienteHistorial(){
  var lista = historialMovimientosFlat();
  if(lista.length === 0) return todayISO();
  return lista.reduce(function(max, r){ return r.fecha > max ? r.fecha : max; }, lista[0].fecha);
}
function aniosDisponiblesHistorial(){
  var set = {};
  historialMovimientosFlat().forEach(function(r){ set[r.fecha.slice(0,4)] = true; });
  var arr = Object.keys(set).map(Number).sort(function(a,b){ return b-a; });
  return arr.length ? arr : [new Date().getFullYear()];
}
function filtrarHistorialPorPeriodo(lista){
  if(state.historialPeriodo === "todo") return lista;
  return lista.filter(function(r){
    if(state.historialPeriodo === "anio") return parseInt(r.fecha.slice(0,4),10) === state.historialAnio;
    if(state.historialPeriodo === "mes") return parseInt(r.fecha.slice(0,4),10) === state.historialAnio && (parseInt(r.fecha.slice(5,7),10)-1) === state.historialMes;
    if(state.historialPeriodo === "dia") return r.fecha === state.historialDia;
    return true;
  });
}
function ordenarLista(lista, orden){
  var arr = lista.slice();
  switch(orden){
    case "fecha_asc": arr.sort(function(a,b){ return a.fecha < b.fecha ? -1 : (a.fecha > b.fecha ? 1 : 0); }); break;
    case "monto_desc": arr.sort(function(a,b){ return b.monto - a.monto; }); break;
    case "monto_asc": arr.sort(function(a,b){ return a.monto - b.monto; }); break;
    case "nombre_asc": arr.sort(function(a,b){ return a.desc.localeCompare(b.desc); }); break;
    case "nombre_desc": arr.sort(function(a,b){ return b.desc.localeCompare(a.desc); }); break;
    default: arr.sort(function(a,b){ return a.fecha > b.fecha ? -1 : (a.fecha < b.fecha ? 1 : 0); });
  }
  return arr;
}
function ordenarHistorial(lista){ return ordenarLista(lista, state.historialOrden); }
function agruparPorCategoria(lista){
  var grupos = {}, orden = [];
  lista.forEach(function(r){
    if(!grupos[r.categoria]){ grupos[r.categoria] = { items: [], subtotal: { USD: 0, "C$": 0 } }; orden.push(r.categoria); }
    grupos[r.categoria].items.push(r);
    grupos[r.categoria].subtotal[r.moneda] += r.monto;
  });
  orden.sort(function(a,b){
    var ta = grupos[a].subtotal.USD + grupos[a].subtotal["C$"];
    var tb = grupos[b].subtotal.USD + grupos[b].subtotal["C$"];
    return tb - ta;
  });
  return { grupos: grupos, orden: orden };
}
function renderBloquesCategoria(agrupado){
  var html = "";
  agrupado.orden.forEach(function(cat, gi){
    var grupo = agrupado.grupos[cat];
    html += '<div class="row-in" style="margin-bottom:22px;animation-delay:' + (Math.min(gi,8)*30) + 'ms;">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">';
    html += '<div style="display:flex;align-items:center;gap:7px;"><span style="width:8px;height:8px;border-radius:50%;background:' + (CAT_COLOR[cat]||"#8A8270") + ';flex-shrink:0;"></span><span class="mono" style="font-size:11.5px;letter-spacing:1.5px;color:var(--ink);text-transform:uppercase;font-weight:600;">' + esc(cat) + '</span></div>';
    var subtotalTxt = [];
    ["USD","C$"].forEach(function(m){ if(grupo.subtotal[m] > 0) subtotalTxt.push(fmtMoney(grupo.subtotal[m], m)); });
    html += '<span class="mono" style="font-size:12px;color:var(--muted);">' + subtotalTxt.join(" + ") + '</span>';
    html += '</div>';
    grupo.items.forEach(function(r){

// ---------- lectura de recibos por foto (OCR) ----------
function cargarTesseract(cb){
  if(window.Tesseract){ cb(true); return; }
  if(cargarTesseract._loading){ cargarTesseract._queue.push(cb); return; }
  cargarTesseract._loading = true;
  cargarTesseract._queue = [cb];
  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js";
  s.onload = function(){ cargarTesseract._queue.forEach(function(f){ f(true); }); cargarTesseract._loading = false; };
  s.onerror = function(){ cargarTesseract._queue.forEach(function(f){ f(false); }); cargarTesseract._loading = false; };
  document.head.appendChild(s);
}

var MESES_MAP_OCR = { ene:1, feb:2, mar:3, abr:4, may:5, jun:6, jul:7, ago:8, sep:9, set:9, oct:10, nov:11, dic:12 };
function pad2(n){ return (n<10?"0":"")+n; }
function esLineaFecha(l){
  return /^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(l) || /^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(l);
}
function fechaLineaAISO(l){
  var m1 = l.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if(m1){
    var mes = MESES_MAP_OCR[m1[2].toLowerCase()];
    if(mes) return m1[3] + "-" + pad2(mes) + "-" + pad2(parseInt(m1[1],10));
  }
  var m2 = l.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m2){
    var y = m2[3].length===2 ? "20"+m2[3] : m2[3];
    return y + "-" + pad2(parseInt(m2[2],10)) + "-" + pad2(parseInt(m2[1],10));
  }
  return null;
}
function detectarMonedaLinea(l){
  if(/USD|US\$|D\u00f3lar/i.test(l)) return "USD";
  if(/C\$|NIO|C\u00f3rdoba/i.test(l)) return "C$";
  return null;
}
var IGNORAR_DESC_OCR = /saldo|disponible|movimientos|actualizaci|c\u00f3digo|contacto|inicio|continuar|tipo de cambio|banco a la mano|mi banco/i;
function esLineaRuido(l){
  if(/\{.*\}/.test(l)) return true;                    // {Alias}
  if(/\d{2}:\d{2}:\d{2}/.test(l)) return true;          // hora tipo 20:04:32
  if(/\d{8,}/.test(l)) return true;                     // numeros de cuenta largos
  if(/^(USD|C\$|NIO)?\s*[\d,]+\.\d{2}$/i.test(l)) return true; // monto suelto sin signo (ej. saldo)
  return false;
}

// Detecta varias transacciones (formato tipo app bancaria: descripción, fecha, monto).
// No depende de que el signo "-" se haya leído bien: todo lo que aparece ANTES de la
// primera fecha reconocida (típicamente el saldo total, arriba de la lista) se ignora.
function parseTransacciones(texto){
  if(!texto) return [];
  var lineas = texto.split("\n").map(function(l){ return l.trim(); }).filter(Boolean);

  var primerFechaIdx = -1;
  for(var j=0;j<lineas.length;j++){
    if(esLineaFecha(lineas[j])){ primerFechaIdx = j; break; }
  }
  if(primerFechaIdx === -1) return []; // no hay estructura de lista de movimientos reconocible

  var candidatos = [];
  var descPendiente = "";
  var fechaPendiente = null;
  var regexMonto = /-?\s?\d{1,3}(?:,\d{3})*\.\d{2}\b/;
  for(var i=0;i<lineas.length;i++){
    var l = lineas[i];
    if(esLineaFecha(l)){
      fechaPendiente = fechaLineaAISO(l);
      continue;
    }
    var mMonto = l.match(regexMonto);
    if(mMonto){
      if(i < primerFechaIdx || !fechaPendiente){
        // monto suelto antes de la primera fecha (ej. el saldo total) u otro numero sin fecha asociada: se ignora
        continue;
      }
      var monto = Math.abs(parseFloat(mMonto[0].replace(/\s/g,"").replace(/,/g,"")));
      if(monto > 0 && descPendiente){
        candidatos.push({
          desc: descPendiente.slice(0,60),
          fecha: fechaPendiente,
          monto: Math.round(monto*100)/100,
          moneda: detectarMonedaLinea(l)
        });
      }
      descPendiente = "";
      fechaPendiente = null;
      continue;
    }
    if(/[a-zA-Z\u00e1-\u00fa\u00c1-\u00da]{3,}/.test(l) && !IGNORAR_DESC_OCR.test(l) && !esLineaRuido(l)){
      descPendiente = descPendiente ? (descPendiente + " " + l) : l;
    }
  }
  return candidatos;
}

function extraerDatosDeTexto(texto){
  var resultado = { monto: null, desc: "", moneda: null };
  if(!texto) return resultado;
  var regexMonto = /\d{1,3}(?:[.,]\d{3})*(?:[.,]\d{2})\b|\b\d+[.,]\d{2}\b/g;
  var candidatos = [];
  var m;
  while((m = regexMonto.exec(texto)) !== null){
    // Nicaragua usa coma para miles y punto para decimales (ej: 1,250.50)
    var normal = m[0].replace(/,/g, "");
    var val = parseFloat(normal);
    if(!isNaN(val) && val > 0 && val < 500000) candidatos.push(val);
  }
  if(candidatos.length){
    var lineas = texto.split("\n");
    var totalLinea = lineas.find(function(l){ return /total|monto|pago/i.test(l); });
    var elegido = null;
    if(totalLinea){
      var enLinea = totalLinea.match(regexMonto);
      if(enLinea && enLinea.length){
        var v = parseFloat(enLinea[enLinea.length-1].replace(/,/g,""));
        if(!isNaN(v) && v > 0) elegido = v;
      }
    }
    resultado.monto = elegido != null ? elegido : Math.max.apply(null, candidatos);
    resultado.monto = Math.round(resultado.monto * 100) / 100;
  }
  if(/c\$|c\u00f3rdoba/i.test(texto)) resultado.moneda = "C$";
  else if(/us\$|usd|d\u00f3lar/i.test(texto)) resultado.moneda = "USD";
  var lineasLimpias = texto.split("\n").map(function(l){ return l.trim(); }).filter(Boolean);
  var posibleDesc = lineasLimpias.find(function(l){
    return /[a-zA-Z\u00e1-\u00fa\u00c1-\u00da]{3,}/.test(l) && !/total|factura|recibo|fecha|gracias|iva|cambio/i.test(l) && l.length < 40;
  });
  resultado.desc = posibleDesc || "";
  return resultado;
}

function procesarFotoGasto(file){
  var estado = document.getElementById("mov-foto-estado");
  if(estado){ estado.style.display = "block"; estado.textContent = "Leyendo la imagen\u2026 espera un momento."; }
  cargarTesseract(function(ok){
    if(!ok){
      if(estado) estado.textContent = "No se pudo cargar el lector de fotos. Revisa tu conexión y escribe el gasto a mano.";
      return;
    }
    window.Tesseract.recognize(file, "spa").then(function(result){
      var texto = (result && result.data && result.data.text) || "";
      var varios = parseTransacciones(texto);

      if(varios.length >= 1){
        var fondoRef = state.fondos.find(function(x){ return x.id === state.openFondoId; });
        varios.forEach(function(c){ if(!c.moneda) c.moneda = fondoRef ? fondoRef.moneda : "USD"; });
        state.deteccion = { fondoId: state.openFondoId, candidatos: varios };
        state.modal = "gastosDetectados";
        render();
        return;
      }

      var datos = extraerDatosDeTexto(texto);
      if(datos.monto){
        var mi = document.getElementById("m-monto");
        if(mi) mi.value = datos.monto;
      }
      if(datos.desc){
        var di = document.getElementById("m-desc");
        if(di && !di.value) di.value = datos.desc;
      }
      if(datos.moneda){
        var msel = document.getElementById("m-moneda");
        if(msel && msel.value !== datos.moneda){
          msel.value = datos.moneda;
          msel.dispatchEvent(new Event("change", { bubbles: true }));
        }
      }
      if(estado){
        estado.textContent = datos.monto
          ? "Detectado autom\u00e1ticamente \u2014 revisa el monto y la descripci\u00f3n antes de guardar."
          : "No logr\u00e9 leer un monto en la foto. Compl\u00e9talo a mano.";
      }
    }).catch(function(){
      if(estado) estado.textContent = "No pude leer esa imagen. Escribe el gasto a mano.";
    });
  });
}

function guardarDetectados(){
  var f = state.fondos.find(function(x){ return x.id === state.deteccion.fondoId; });
  if(!f){ state.modal = null; state.deteccion = null; render(); return; }
  var n = state.deteccion.candidatos.length;
  var guardados = 0, faltaTC = 0;
  for(var i=0;i<n;i++){
    var chk = document.getElementById("det-check-" + i);
    if(!chk || !chk.checked) continue;
    var descEl = document.getElementById("det-desc-" + i);
    var montoEl = document.getElementById("det-monto-" + i);
    var monedaEl = document.getElementById("det-moneda-" + i);
    var fechaEl = document.getElementById("det-fecha-" + i);
    var catEl = document.getElementById("det-cat-" + i);
    var desc = (descEl && descEl.value || "").trim();
    var monto = montoEl ? parseFloat(montoEl.value) : NaN;
    var moneda = monedaEl ? monedaEl.value : f.moneda;
    var fecha = (fechaEl && fechaEl.value) || todayISO();
    var categoria = (catEl && catEl.value) || "Otros";
    if(!desc || !(monto > 0)) continue;
    var tipoCambio = null, montoConvertido = monto;
    if(moneda !== f.moneda){
      var tcEl = document.getElementById("det-tc-" + i);
      var tc = tcEl ? parseFloat(tcEl.value) : NaN;
      if(!(tc > 0)){ faltaTC++; continue; }
      tipoCambio = tc;
      if(f.moneda === "USD" && moneda === "C$") montoConvertido = monto / tc;
      else if(f.moneda === "C$" && moneda === "USD") montoConvertido = monto * tc;
      montoConvertido = Math.round(montoConvertido * 100) / 100;
    }
    f.movimientos.unshift({ id: uid(), desc: desc, monto: monto, moneda: moneda, tipoCambio: tipoCambio, montoConvertido: montoConvertido, categoria: categoria, fecha: fecha });
    guardados++;
  }
  save();
  state.modal = null;
  state.deteccion = null;
  render();
  if(faltaTC > 0){
    showToast(guardados + " guardados \u2014 " + faltaTC + " sin tipo de cambio, no se guardaron");
  } else {
    showToast(guardados + " gasto" + (guardados===1?"":"s") + " guardado" + (guardados===1?"":"s"));
  }
}

  state.deteccion.candidatos.forEach(function(c, i){
    var distinta = c.moneda !== monedaFondo;
    html += '<div style="border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;background:var(--paper);">';
    html += '<label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;"><input type="checkbox" id="det-check-' + i + '" checked style="width:17px;height:17px;accent-color:var(--forest);"><span style="font-size:12.5px;color:var(--ink);font-weight:600;">Guardar este movimiento</span></label>';
    html += field('Descripción', '<input id="det-desc-' + i + '" style="' + inputStyle + '" value="' + esc(c.desc) + '">');

function afterRender(fondoAbierto){
  var catWrap = document.getElementById("m-categorias");
  if(catWrap){
    catWrap.querySelectorAll(".cat-chip").forEach(function(btn){
      btn.addEventListener("click", function(){
        mem.categoriaSel = btn.getAttribute("data-cat");
        catWrap.querySelectorAll(".cat-chip").forEach(function(b){
          var c = b.getAttribute("data-cat");
          var active = c === mem.categoriaSel;
          b.style.borderColor = active ? CAT_COLOR[c] : "var(--line)";
          b.style.background = active ? CAT_COLOR[c] + "22" : "transparent";
          b.style.color = active ? "var(--ink)" : "var(--muted)";
        });
      });
    });
  }
  var monedaSel = document.getElementById("m-moneda");
  if(monedaSel){
    var f = state.fondos.find(function(x){ return x.id === state.openFondoId; });
    var wrap = document.getElementById("m-tipocambio-wrap");
    var sync = function(){
      var distinta = f && monedaSel.value !== f.moneda;
      wrap.style.display = distinta ? "block" : "none";
    };
    monedaSel.addEventListener("change", sync);
    sync();
  }
  var detMonedaSels = document.querySelectorAll(".det-moneda-sel");
  if(detMonedaSels.length && state.deteccion){
    var fondoDet = state.fondos.find(function(x){ return x.id === state.deteccion.fondoId; });
    detMonedaSels.forEach(function(sel){
      sel.addEventListener("change", function(){
        var idx = sel.getAttribute("data-idx");
        var wrap = document.getElementById("det-tc-wrap-" + idx);
        if(wrap && fondoDet) wrap.style.display = (sel.value !== fondoDet.moneda) ? "block" : "none";
      });
    });
  }
  var fDiezmoCheck = document.getElementById("f-diezmo-check");
  if(fDiezmoCheck){
    var fDiezmoWrap = document.getElementById("f-diezmo-wrap");
    var fMontoInput = document.getElementById("f-monto");
    var fPctInput = document.getElementById("f-diezmo-pct");
    var fMonedaSel = document.getElementById("f-moneda");
    var fPreview = document.getElementById("f-diezmo-preview");
    var actualizarPreview = function(){
      if(!fDiezmoCheck.checked || !fPreview) { if(fPreview) fPreview.textContent = ""; return; }
      var monto = parseFloat(fMontoInput.value);
      var pct = parseFloat(fPctInput.value);
      if(monto > 0 && pct > 0){
        var diezmo = Math.round(monto * (pct/100) * 100) / 100;
        fPreview.textContent = "= " + fmtMoney(diezmo, fMonedaSel.value) + " apartados de diezmo";
      } else {
        fPreview.textContent = "";
      }
    };
    fDiezmoCheck.addEventListener("change", function(){
      fDiezmoWrap.style.display = fDiezmoCheck.checked ? "block" : "none";
      actualizarPreview();
    });
    fMontoInput.addEventListener("input", actualizarPreview);
    fPctInput.addEventListener("input", actualizarPreview);
    fMonedaSel.addEventListener("change", actualizarPreview);
  }
  var histAnioSel = document.getElementById("hist-anio-sel");
  if(histAnioSel){
    histAnioSel.addEventListener("change", function(){ state.historialAnio = parseInt(histAnioSel.value,10); render(); });
  }
  var histDiaInput = document.getElementById("hist-dia-input");
  if(histDiaInput){
    histDiaInput.addEventListener("change", function(){ state.historialDia = histDiaInput.value || todayISO(); render(); });
  }
  var histOrdenSel = document.getElementById("hist-orden-sel");
  if(histOrdenSel){
    histOrdenSel.addEventListener("change", function(){ state.historialOrden = histOrdenSel.value; render(); });
  }
  var repOrdenSel = document.getElementById("rep-orden-sel");
  if(repOrdenSel){
    repOrdenSel.addEventListener("change", function(){ state.reportesOrden = repOrdenSel.value; render(); });
  }
  var fileInput = document.getElementById("import-file-input");
  if(fileInput){
    fileInput.addEventListener("change", function(e){
      var file = e.target.files && e.target.files[0];
      e.target.value = "";
      if(file) onFileChosen(file);
    });
  }
  var fotoInput = document.getElementById("mov-foto-input");
  if(fotoInput){
    fotoInput.addEventListener("change", function(e){
      var file = e.target.files && e.target.files[0];
      e.target.value = "";
      if(file) procesarFotoGasto(file);
    });
  }
}

function bindOnce(){
  var root = document.getElementById("app");
  if(root._bound) return;
  root._bound = true;
  root.addEventListener("click", function(e){
    var stopEl = e.target.closest('[data-stop]');
    var el = e.target.closest("[data-action]");
    if(stopEl && el && !stopEl.contains(el)){
      el = null;
    }
    if(!el){
      var backdrop = e.target.closest('[data-action="close-modal"]');
      if(backdrop && !stopEl){ state.modal = null; render(); }
      return;
    }
    var action = el.getAttribute("data-action");

    switch(action){
      case "backup-now": marcarPrompteado(); state.modal = null; render(); exportarJSON(); break;
      case "backup-later": marcarPrompteado(); state.modal = null; render(); break;
      case "open-ajustes": state.modal = "ajustes"; render(); break;
      case "open-nuevo-fondo": state.modal = "nuevoFondo"; render(); break;
      case "open-nuevo-mov": state.modal = "nuevoMov"; render(); break;
      case "edit-mov": {
        state.editandoMovId = el.getAttribute("data-mov");
        state.modal = "editarMov";
        render();
        break;
      }
      case "mov-foto": {
        var fotoInput = document.getElementById("mov-foto-input");
        if(fotoInput) fotoInput.click();
        break;
      }
      case "close-modal": state.modal = null; render(); break;
      case "open-fondo": state.openFondoId = el.getAttribute("data-id"); render(); break;
      case "cerrar-fondo-detalle": state.openFondoId = null; render(); break;
      case "set-tab": state.tab = el.getAttribute("data-tab"); render(); break;
      case "delete-mov": deleteMovimiento(el.getAttribute("data-fondo"), el.getAttribute("data-mov")); break;
      case "delete-mov-desde-editar": {
        deleteMovimiento(el.getAttribute("data-fondo"), el.getAttribute("data-mov"));
        state.modal = null; state.editandoMovId = null; render();
        break;
      }
      case "confirm-finalizar": state.confirmFinalizarId = el.getAttribute("data-id"); state.modal = "confirmFinalizar"; render(); break;
      case "finalizar-proyecto": finalizarProyecto(state.confirmFinalizarId); break;
      case "reabrir-proyecto": reabrirProyecto(el.getAttribute("data-id")); break;
      case "confirm-delete-fondo": state.confirmDeleteId = el.getAttribute("data-id"); state.modal = "confirmDelete"; render(); break;
      case "delete-fondo": deleteFondo(state.confirmDeleteId); break;
      case "mes-prev": {
        var nm = state.reportMes - 1, na = state.reportAnio;
        if(nm < 0){ nm = 11; na -= 1; }
        state.reportMes = nm; state.reportAnio = na; render(); break;
      }
      case "mes-next": {
        var nm2 = state.reportMes + 1, na2 = state.reportAnio;
        if(nm2 > 11){ nm2 = 0; na2 += 1; }
        state.reportMes = nm2; state.reportAnio = na2; render(); break;
      }
      case "hist-periodo": {
        var per = el.getAttribute("data-periodo");
        state.historialPeriodo = per;
        if(per === "anio"){
          state.historialAnio = aniosDisponiblesHistorial()[0];
        } else if(per === "mes" || per === "dia"){
          var f = fechaMasRecienteHistorial();
          state.historialAnio = parseInt(f.slice(0,4),10);
          state.historialMes = parseInt(f.slice(5,7),10) - 1;
          state.historialDia = f;
        }
        render();
        break;
      }
      case "hist-mes-prev": {
        var hnm = state.historialMes - 1, hna = state.historialAnio;
        if(hnm < 0){ hnm = 11; hna -= 1; }
        state.historialMes = hnm; state.historialAnio = hna; render(); break;
      }
      case "hist-mes-next": {
        var hnm2 = state.historialMes + 1, hna2 = state.historialAnio;
        if(hnm2 > 11){ hnm2 = 0; hna2 += 1; }
        state.historialMes = hnm2; state.historialAnio = hna2; render(); break;
      }
      case "export-json": exportarJSON(); break;
      case "export-csv": exportarCSV(); break;
      case "export-xlsx": exportarXLSX(); break;
      case "export-txt": exportarTXT(); break;
      case "import-click": {
        var fi = document.getElementById("import-file-input");
        if(fi) fi.click();
        break;
      }
      case "confirm-import": confirmarImport(); break;
      case "guardar-diezmo-pct": {
        var pctAj = parseFloat(document.getElementById("ajustes-diezmo-pct").value);
        if(!(pctAj > 0 && pctAj <= 100)){ showToast("Ingresa un porcentaje válido"); return; }
        guardarPorcentajeDiezmo(pctAj);
        showToast("Porcentaje de diezmo guardado");
        break;
      }
      case "guardar-detectados": guardarDetectados(); break;
      case "save-nuevo-fondo": {
        var nombre = (document.getElementById("f-nombre").value || "").trim();
        var monto = parseFloat(document.getElementById("f-monto").value);
        var moneda = document.getElementById("f-moneda").value;
        var fecha = document.getElementById("f-fecha").value || todayISO();
        if(!nombre || !(monto > 0)){ showToast("Falta el nombre o el monto"); return; }
        var diezmoCheck = document.getElementById("f-diezmo-check");
        var diezmoPct = 0;
        if(diezmoCheck && diezmoCheck.checked){
          var pctEl = document.getElementById("f-diezmo-pct");
          var pctVal = pctEl ? parseFloat(pctEl.value) : NaN;
          if(!(pctVal > 0 && pctVal <= 100)){ showToast("Revisa el porcentaje de diezmo"); return; }
          diezmoPct = pctVal;
          guardarPorcentajeDiezmo(pctVal);
        }
        addFondo(nombre, monto, moneda, fecha, diezmoPct);
        break;
      }
      case "save-nuevo-mov": {
        var fondo = state.fondos.find(function(x){ return x.id === state.openFondoId; });
        var desc = (document.getElementById("m-desc").value || "").trim();
        var monto2 = parseFloat(document.getElementById("m-monto").value);
        var monedaGasto = document.getElementById("m-moneda").value;
        var fecha2 = document.getElementById("m-fecha").value || todayISO();
        if(!desc || !(monto2 > 0)){ showToast("Falta la descripción o el monto"); return; }
        var tipoCambio = null, montoConvertido = monto2;
        if(fondo && monedaGasto !== fondo.moneda){
          var tcInput = document.getElementById("m-tipocambio");
          var tcVal = tcInput ? parseFloat(tcInput.value) : NaN;
          if(!(tcVal > 0)){ showToast("Falta el tipo de cambio"); return; }
          tipoCambio = tcVal;
          if(fondo.moneda === "USD" && monedaGasto === "C$"){ montoConvertido = monto2 / tcVal; }
          else if(fondo.moneda === "C$" && monedaGasto === "USD"){ montoConvertido = monto2 * tcVal; }
          montoConvertido = Math.round(montoConvertido * 100) / 100;
        }
        addMovimiento(state.openFondoId, desc, monto2, monedaGasto, tipoCambio, montoConvertido, mem.categoriaSel, fecha2);
        break;
      }
      case "save-editar-mov": {
        var fondoE = state.fondos.find(function(x){ return x.id === state.openFondoId; });
        var descE = (document.getElementById("m-desc").value || "").trim();
        var montoE = parseFloat(document.getElementById("m-monto").value);
        var monedaGastoE = document.getElementById("m-moneda").value;
        var fechaE = document.getElementById("m-fecha").value || todayISO();
        if(!descE || !(montoE > 0)){ showToast("Falta la descripción o el monto"); return; }
        var tipoCambioE = null, montoConvertidoE = montoE;
        if(fondoE && monedaGastoE !== fondoE.moneda){
          var tcInputE = document.getElementById("m-tipocambio");
          var tcValE = tcInputE ? parseFloat(tcInputE.value) : NaN;
          if(!(tcValE > 0)){ showToast("Falta el tipo de cambio"); return; }
          tipoCambioE = tcValE;
          if(fondoE.moneda === "USD" && monedaGastoE === "C$"){ montoConvertidoE = montoE / tcValE; }
          else if(fondoE.moneda === "C$" && monedaGastoE === "USD"){ montoConvertidoE = montoE * tcValE; }
          montoConvertidoE = Math.round(montoConvertidoE * 100) / 100;
        }
        editarMovimiento(state.openFondoId, state.editandoMovId, descE, montoE, monedaGastoE, tipoCambioE, montoConvertidoE, mem.categoriaSel, fechaE);
        break;
      }
    }
  });
}

// ---------- init ----------
load();
if(shouldPromptBackup()){ state.modal = "backupPrompt"; }
render();
})();
</script>
